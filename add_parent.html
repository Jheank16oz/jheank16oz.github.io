<!DOCTYPE html>
<html lang="en">
<head>

 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#004ba0" />
  <meta name="description" content="App monitoring">

  <title>Login</title>
  <link rel="stylesheet" type="text/css" href="assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/materialize-stepper@3.1.0/dist/css/mstepper.min.css">


  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAgTs9WuiggGf9glfAyzSXgI96O0kF_N1Q&amp;libraries=geometry"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gmaps.js/0.4.9/gmaps.min.js"></script>
  <script src="https://unpkg.com/materialize-stepper@3.1.0/dist/js/mstepper.min.js"></script>

</head>
<body >

  <div class="left-align" style="margin-top: 1rem; margin-left: 1rem;">
    <i class="small material-icons fa ">arrow_back</i>
  </div>
  
  <div class="container">

    <div class="row">
      <h5>Agregar Familiar</h6>
      <p>Agrega aquí a cada uno de los familiares con
        los que convives actualmente</p>
    </div>
    

  <div class="row">
    <div class="row">
      <div class="input-field col s12">
        <input placeholder="Nombre" id="email" type="text" class="validate">
        <label for="nombre" class="active">Nombre</label>
      </div>
    </div>
    <div class="row">
      <div class="input-field col s12" >
        <input placeholder="Edad" id="edad" type="number" class="validate">
        <label for="edad" class="active">Edad</label>
      </div>
    </div>

    <label>Rol</label>
    <select class="browser-default">
      <option value="" disabled selected>Selecione el rol</option>
      <option value="1">Madre</option>
      <option value="2">Padre</option>
      <option value="3">Hijo</option>
    </select>

    <br>
    <label>Enfermedades preexistentes</label>
    <select class="browser-default">
      <option value="" disabled selected>Selecione una enfermedad</option>
      <option value="1">a</option>
      <option value="2">b</option>
      <option value="3">c</option>
    </select>
    <br>
    <label>Viajes al exterior 2020</label>
    <select class="browser-default">
      <option value="" disabled selected>Selecione una opción</option>
      <option value="1">Ninguna</option>
      <option value="2">1</option>
      <option value="3">2 o mas</option>
    </select>
    <br>
    <label>Genero</label>
    <select class="browser-default">
      <option value="" disabled selected>Selecione un genero</option>
      <option value="1">Hombre</option>
      <option value="2">Mujer</option>
      <option value="3"> LGTBI</option>
    </select>

    <br>
    <div class="center-align">
      <a class="waves-effect waves-light btn-small">Agregar</a>
    </div>
  </div>
  

    
  
</body>
</html>
